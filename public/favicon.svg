<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2E2348"/>
  <!-- Network path: 4 nodes + final coral dot -->
  <line x1="5" y1="22" x2="11" y2="14" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11" y1="14" x2="18" y2="19" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="19" x2="27" y2="11" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="5" cy="22" r="2" fill="#FFFFFF"/>
  <circle cx="11" cy="14" r="2" fill="#FFFFFF"/>
  <circle cx="18" cy="19" r="2" fill="#FFFFFF"/>
  <!-- Final node: coral -->
  <circle cx="27" cy="11" r="3" fill="#E63948"/>
</svg>
