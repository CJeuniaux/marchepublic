    <!-- Données structurées — FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Une ASBL peut-elle vraiment être soumise aux marchés publics ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Une ASBL peut être qualifiée de pouvoir adjudicateur si elle est majoritairement financée par des fonds publics, contrôlée par une autorité publique, ou si sa gouvernance est dominée par des représentants publics. Le statut associatif ne protège pas automatiquement."
          }
        },
        {
          "@type": "Question",
          "name": "Recevoir un subside m'oblige-t-il à faire un marché public ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pas mécaniquement. Recevoir un subside ne suffit pas. Mais si le financement public dépasse certains seuils, ou si votre convention impose une mise en concurrence, vos obligations changent."
          }
        },
        {
          "@type": "Question",
          "name": "Trois devis suffisent-ils ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Souvent c'est une bonne pratique — parfois c'est insuffisant. Selon votre statut et le montant, une procédure formalisée peut être exigée. Demander trois devis ne vous met pas automatiquement en règle."
          }
        },
        {
          "@type": "Question",
          "name": "Cet outil remplace-t-il un juriste ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non, et il ne le prétend pas. C'est un outil pédagogique et indépendant : il trace un chemin clair et renvoie aux sources officielles. Pour une situation engageante ou complexe, faites valider votre procédure par une personne compétente."
          }
        },
        {
          "@type": "Question",
          "name": "Comment interpréter mon résultat ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le résultat est une orientation indicative — pas un avis juridique. Il vous indique un niveau de vigilance (faible, modéré, élevé) et les points à vérifier avant d'engager votre dépense. En cas de doute sérieux, consultez une personne compétente."
          }
        }
      ]
    }
    </script>
