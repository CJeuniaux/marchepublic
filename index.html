    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Mon ASBL doit-elle faire un marché public ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Cela dépend de trois critères : votre ASBL est-elle financée à plus de 50% par une autorité publique, soumise à son contrôle de gestion, ou composée majoritairement d'administrateurs désignés par une autorité publique ? Si oui, elle est probablement soumise à la réglementation des marchés publics (loi du 17 juin 2016)." }
        },
        {
          "@type": "Question",
          "name": "Quel est le seuil qui déclenche un marché public pour une ASBL ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Le seuil général est de 30.000 euros hors TVA. En dessous, des règles de bonne gestion s'appliquent sans procédure formelle. Au-dessus, la procédure dépend du montant et du type d'achat (services, fournitures ou travaux)." }
        },
        {
          "@type": "Question",
          "name": "Un achat avec des subsides déclenche-t-il automatiquement un marché public ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Pas automatiquement. C'est le statut de l'ASBL (pouvoir adjudicateur ou non) qui détermine l'obligation, pas uniquement le financement public de l'achat. Le diagnostic permet de vérifier votre situation spécifique." }
        },
        {
          "@type": "Question",
          "name": "MarchéPublic.be remplace-t-il un avis juridique ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Non. MarchéPublic.be est un outil de premier repère pédagogique et indépendant. Il ne constitue pas un avis juridique. En cas de doute, consultez un juriste ou le service juridique de votre fédération." }
        },
        {
          "@type": "Question",
          "name": "Le diagnostic est-il gratuit ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, le diagnostic est entièrement gratuit et prend environ 5 minutes. Il donne une orientation indicative avec des sources officielles belges." }
        }
      ]
    }
